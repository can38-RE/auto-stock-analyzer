name: Daily Stock Analysis

on:
  schedule:
    # 早盘分析: 北京时间9:25 (UTC 1:25) - 为9:30开盘做准备，10点前收到报告
    - cron: '25 1 * * 1-5'
    # 午盘分析: 北京时间14:00 (UTC 6:00) - 为14:30午后交易做准备
    - cron: '0 6 * * 1-5'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run analysis
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_SMTP_AUTH_CODE: ${{ secrets.QQ_SMTP_AUTH_CODE }}
          RECEIVER_EMAIL: "437590034@qq.com"
        run: |
          python -m src.main
      
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: reports/
      
      - name: Deploy to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
